services:
  etl_engine:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      # Mapujemy cały bieżący folder projektu (kropka) do /app w kontenerze
      - .:/app
      # Mapujemy dane surowe z Google Drive do podfolderu gdrive_raw
      - "/mnt/g/Mój dysk:/app/gdrive_raw:ro"
    environment:
      - PYTHONUNBUFFERED=1